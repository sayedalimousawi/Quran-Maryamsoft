<html>
<head>
<script language="javascript" src="Quran.js"></script>
<script language="javascript" src="QuranTG.js"></script>
<script language="javascript" src="Sure.js"></script>

</head>

<body dir="RTL" style="font-family:Tahoma; font-size:14px; width:100%">
<textarea id="oStrSearch" style="width:800px; height:80px; font-size:32pt; font-family:'wm_Naskh Qurani 93';"></textarea>
<a href="javascript:SmartSearch()">حستجو</a><br>
<br>
<div id="oResult"  style="width:100%; height:450px; overflow: scroll; border: solid 2 #CCCCCC"></div>
<script language="javascript">
//---------------------------------------------------------------------------------------------
// Optimized: Pre-compute character codes and use single regex
const MARKS_REGEX = /[\u064B-\u0652\u06E0-\u06E2\u06E7\u06D6-\u06DC\u0660-\u0662]/g;

// Optimized: Cache parsed data to avoid re-parsing on each search
let _Quran = null, _QuranTG = null, _Sure = null;

function GenerateData(Text) {
	return Text.split(" + ").map(sure => sure.split(" - "));
}

// Optimized: Single replace operation instead of loop through characters
function RemoveMarks(str) {
	return str.replace(MARKS_REGEX, "");
}

// Optimized: Lazy initialization with caching
function getQuran() {
	if (!_Quran) _Quran = GenerateData(QuranText);
	return _Quran;
}
function getQuranTG() {
	if (!_QuranTG) _QuranTG = GenerateData(QuranTextTG);
	return _QuranTG;
}
function getSure() {
	if (!_Sure) _Sure = GenerateData(SureText);
	return _Sure;
}

function SmartSearch() {
	var sFind = RemoveMarks(oStrSearch.value);
	sFind = sFind.replace(/ي/g, "ی"); // yeh Farsi
	sFind = sFind.replace(/ک/g, "ك"); // Kaf Arab
	
	var Quran = getQuran();
	var QuranTG = getQuranTG();
	var Sure = getSure();
	
	var results = [];
	for(var i = 0; i < Quran.length; i++) {
		for(var j = 0; j < Quran[i].length; j++) {
			if (RemoveMarks(Quran[i][j]).indexOf(sFind) !== -1) {
				results.push({
					num: results.length + 1,
					text: QuranTG[i][j],
					sure: Sure[i]
				});
			}
		}
	}
	
	// Optimized: Build HTML array and join once instead of string concatenation
	var html = ["<table width=100% style='table-layout:fixed;font-size:24pt;font-family:wm_Naskh Qurani 93;'>"];
	for (var k = 0; k < results.length; k++) {
		var r = results[k];
		var color = (k % 2) ? "#E0E0E0" : "#F0F0F0";
		html.push("<tr style='background-color:" + color + ";'><td>" + r.num + "- " + r.text + " <" + r.sure + "></td></tr>");
	}
	html.push("</table>");
	oResult.innerHTML = html.join("");
}

// Initialize on first load
var Quran = getQuran();
var QuranTG = getQuranTG();
var Sure = getSure();

</script>

</body>

</html>
